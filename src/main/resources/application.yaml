spring:
  application:
    name: reconpay

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reconpay}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:BK4DqZtSaFy7ywhqiEK3TGdEZFfnbd0dBkAS9wxyIzM}
  expiration: ${JWT_EXPIRATION:604800}

