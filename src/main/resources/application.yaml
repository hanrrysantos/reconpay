  spring:
    application:
      name: reconpay

    datasource:
      url: ${DB_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

      jpa:
          hibernate:
              ddl-auto: validate
          show-sql: true
          properties:
              hibernate:
              format_sql: true
              dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
