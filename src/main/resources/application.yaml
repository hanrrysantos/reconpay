spring:
  application:
    name: reconpay

  datasource:
    url: jdbc:postgresql://localhost:5432/reconpay
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
            format_sql: true
            dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
      enabled: true

server:
    port: 8080
