services:

  db-reconpay:
    image: postgres:16
    container_name: reconpay-postgres
    environment:
      - POSTGRES_DB=reconpay
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d reconpay" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - reconpay_data:/var/lib/postgresql/data

  merchant-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: reconpay/merchant-service:1.0
    container_name: merchant-service
    depends_on:
      db-reconpay:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
        - SPRING_DATASOURCE_HOST=db-reconpay
        - SPRING_DATASOURCE_URL=jdbc:postgresql://db-reconpay:5432/reconpay
        - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
        - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

volumes:
  reconpay_data:
